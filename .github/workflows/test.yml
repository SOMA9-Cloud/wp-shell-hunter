name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show environment
        run: |
          python --version
          uname -a

      - name: Run unit tests (stdlib only)
        run: |
          python -m unittest discover -s tests -v

      - name: Smoke test against synthetic infected tree
        run: |
          ./bin/wp-shell-hunter --version
          # Build a tiny infected fixture inline
          mkdir -p /tmp/wptest/wp-admin/maint/maint
          printf '<?php echo "shell";' > /tmp/wptest/wp-admin/maint/maint/x.tiff
          # Should exit 2 (malicious found)
          set +e
          ./bin/wp-shell-hunter /tmp/wptest --no-colour --no-hash
          rc=$?
          set -e
          if [ "$rc" -ne 2 ]; then
            echo "expected exit code 2 (malicious); got $rc" >&2
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff (dev only — not a runtime dep)
        run: pip install ruff
      - name: Lint
        run: ruff check src tests
