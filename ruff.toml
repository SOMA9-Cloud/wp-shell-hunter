# wp-shell-hunter ruff configuration
# Production code uses stdlib only; ruff is dev-time only.
#
# v0.1.0: conservative ruleset — only pyflakes (real bugs).
# Future versions will add isort (I) and pycodestyle (E/W) once codebase
# is uniformly formatted.

line-length = 100

[lint]
select = ["F"]

[lint.per-file-ignores]
"tests/*.py" = ["F401"]
