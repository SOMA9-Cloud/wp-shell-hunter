# wp-shell-hunter ruff configuration
# Production code uses stdlib only; ruff is dev-time only.

line-length = 100

[lint]
# Default ruleset is strict enough; explicit selection for clarity.
select = ["E", "F", "W", "I"]

[lint.per-file-ignores]
# Tests deliberately call sys.path.insert before importing wp_shell_hunter,
# because the package is not installed during CI runs (stdlib-only by design).
"tests/*.py" = ["E402"]
